name: CI - Build & All Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start infrastructure (Postgres + Kafka)
        run: |
          docker compose up -d
          sleep 10   # give services time to start

      - name: Build + Run All Tests (Unit + Integration)
        run: ./mvnw clean verify -B --no-transfer-progress

      - name: Stop infrastructure
        if: always()
        run: docker compose down -v
